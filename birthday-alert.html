<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 사무국 생일 알림</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Serif+Display&display=swap');
    
    :root {
      --bg: #0d0f14;
      --card: #1e2230;
      --border: #2a2f3d;
      --accent: #f4a261;
      --accent2: #e76f51;
      --gold: #ffd166;
      --text: #e8eaf0;
      --muted: #6b7280;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      padding: 40px 20px;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    header {
      text-align: center;
      margin-bottom: 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 20px;
    }
    
    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 42px;
      background: linear-gradient(135deg, #fff, var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    
    .badge {
      display: inline-block;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
    }
    
    .header-actions {
      display: flex;
      gap: 8px;
    }
    
    .btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
      font-family: 'Noto Sans KR', sans-serif;
    }
    
    .btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-color: transparent;
      color: white;
    }
    
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 16px;
    }
    
    .tab-btn {
      background: none;
      border: none;
      color: var(--muted);
      padding: 8px 12px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      font-weight: 500;
    }
    
    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    
    .month-nav {
      display: flex;
      gap: 6px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    
    .month-btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }
    
    .month-btn.active {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-color: transparent;
      color: white;
    }
    
    .birthday-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    .birthday-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: all 0.2s;
    }
    
    .birthday-card:hover {
      border-color: var(--accent);
      transform: translateX(4px);
    }
    
    .birthday-card.today {
      background: linear-gradient(135deg, rgba(244,162,97,0.12), rgba(231,111,81,0.06));
      border-color: var(--accent);
      box-shadow: 0 0 20px rgba(244,162,97,0.2);
    }
    
    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }
    
    .card-info { flex: 1; }
    .card-name { font-weight: 500; margin-bottom: 4px; }
    .card-meta { font-size: 12px; color: var(--muted); display: flex; gap: 12px; flex-wrap: wrap; }
    
    .date-badge {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 12px;
      text-align: center;
      flex-shrink: 0;
    }
    
    .date-day { font-size: 18px; font-weight: 700; line-height: 1; }
    .date-month { font-size: 10px; color: var(--muted); }
    
    .btn-delete {
      background: rgba(231,111,81,0.2);
      border: none;
      color: var(--accent2);
      padding: 4px 8px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 11px;
    }
    
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }
    
    .cal-header {
      font-weight: 700;
      text-align: center;
      padding: 8px;
      color: var(--muted);
      font-size: 12px;
    }
    
    .cal-day {
      aspect-ratio: 1;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px;
      background: var(--card);
      font-size: 11px;
      overflow: auto;
    }
    
    .cal-day-num { font-weight: 600; color: var(--muted); }
    .cal-names { font-size: 9px; color: var(--accent); margin-top: 2px; }
    
    .stats {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 40px;
      padding-top: 32px;
      border-top: 1px solid var(--border);
    }
    
    .stat-box {
      text-align: center;
      padding: 16px 24px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      min-width: 100px;
    }
    
    .stat-num {
      font-family: 'DM Serif Display', serif;
      font-size: 28px;
      color: var(--accent);
    }
    
    .stat-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
    }
    
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    
    .modal.active { display: flex; }
    
    .modal-content {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      max-width: 400px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
    }
    
    .modal-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 20px;
    }
    
    .form-group {
      margin-bottom: 16px;
    }
    
    .form-group label {
      display: block;
      font-size: 13px;
      margin-bottom: 6px;
      color: var(--muted);
    }
    
    .form-group input,
    .form-group select {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px;
      border-radius: 8px;
      font-family: 'Noto Sans KR', sans-serif;
    }
    
    .form-actions {
      display: flex;
      gap: 8px;
      margin-top: 24px;
    }
    
    .form-actions .btn { flex: 1; }
    
    .empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }
    
    @media (max-width: 600px) {
      header { flex-direction: column; text-align: center; }
      .calendar-grid { grid-template-columns: repeat(4, 1fr); }
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <div>
      <div class="badge">🎂 2026 생일 상품권</div>
      <h1>사무국 생일 알림</h1>
    </div>
    <div class="header-actions">
      <button class="btn btn-primary" onclick="openModal()">+ 직원 추가</button>
      <button class="btn" onclick="downloadData()">📥 내보내기</button>
    </div>
  </header>

  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('list')">목록</button>
    <button class="tab-btn" onclick="showTab('calendar')">캘린더</button>
  </div>

  <div id="list" class="tab-content active">
    <div class="month-nav" id="monthNav"></div>
    <div id="listContent"></div>
  </div>

  <div id="calendar" class="tab-content">
    <div class="calendar-grid" id="calendarContent"></div>
  </div>

  <div class="stats">
    <div class="stat-box">
      <div class="stat-num" id="total">0</div>
      <div class="stat-label">총 인원</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="thisMonth">0</div>
      <div class="stat-label">이번 달</div>
    </div>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <div class="modal-title">직원 추가</div>
    <form onsubmit="addEmployee(event)">
      <div class="form-group">
        <label>이름 *</label>
        <input type="text" id="name" required>
      </div>
      <div class="form-group">
        <label>직원 ID</label>
        <input type="text" id="id" placeholder="예: 2025-0001">
      </div>
      <div class="form-group">
        <label>부서 *</label>
        <select id="dept" required>
          <option value="">선택</option>
          <option value="활동지원팀">활동지원팀</option>
          <option value="사무국">사무국</option>
          <option value="복지사업팀">복지사업팀</option>
          <option value="사무행정실">사무행정실</option>
        </select>
      </div>
      <div class="form-group">
        <label>생일 월 *</label>
        <select id="month" required>
          <option value="">선택</option>
          <option value="1">1월</option><option value="2">2월</option><option value="3">3월</option>
          <option value="4">4월</option><option value="5">5월</option><option value="6">6월</option>
          <option value="7">7월</option><option value="8">8월</option><option value="9">9월</option>
          <option value="10">10월</option><option value="11">11월</option><option value="12">12월</option>
        </select>
      </div>
      <div class="form-group">
        <label>생일 일 *</label>
        <input type="number" id="day" min="1" max="31" required>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">추가</button>
        <button type="button" class="btn" onclick="closeModal()">취소</button>
      </div>
    </form>
  </div>
</div>

<script>
const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const COLORS = { '활동지원팀': '#6c8ebf', '사무국': '#82b366', '복지사업팀': '#d6b656', '사무행정실': '#ae4132' };

let data = JSON.parse(localStorage.getItem('birthdays')) || [
  { id: 1, name: '이혜민', empId: '2017-0023', dept: '활동지원팀', m: 1, d: 16 },
  { id: 2, name: '이은희', empId: '2017-0002', dept: '사무국', m: 1, d: 22 },
  { id: 3, name: '신건철', empId: '2026-0009', dept: '사무국', m: 1, d: 28 },
  { id: 4, name: '정채윤', empId: '2025-0095', dept: '활동지원팀', m: 2, d: 1 },
  { id: 5, name: '김은서', empId: '2025-0078', dept: '복지사업팀', m: 2, d: 15 },
  { id: 6, name: '노현숙', empId: '2024-0139', dept: '사무행정실', m: 2, d: 17 },
  { id: 7, name: '김주진', empId: '2022-0204', dept: '활동지원팀', m: 2, d: 24 },
  { id: 8, name: '박수빈', empId: '2026-0008', dept: '복지사업팀', m: 4, d: 19 },
  { id: 9, name: '송지은', empId: '2025-0121', dept: '복지사업팀', m: 7, d: 2 },
  { id: 10, name: '주덕원', empId: '2025-0138', dept: '복지사업팀', m: 9, d: 18 },
  { id: 11, name: '권은지', empId: '2025-0137', dept: '활동지원팀', m: 9, d: 22 },
  { id: 12, name: '김유리', empId: '2026-0012', dept: '활동지원팀', m: 10, d: 20 },
  { id: 13, name: '이세은', empId: '2024-0001', dept: '복지사업팀', m: 11, d: 7 },
  { id: 14, name: '박진미', empId: '2017-0118', dept: '활동지원팀', m: 11, d: 9 },
  { id: 15, name: '김휘원', empId: '2025-0043', dept: '사무행정실', m: 11, d: 9 },
  { id: 16, name: '인상필', empId: '2025-0126', dept: '복지사업팀', m: 11, d: 10 },
  { id: 17, name: '최유나', empId: '2024-0086', dept: '복지사업팀', m: 11, d: 14 },
  { id: 18, name: '조승민', empId: '2025-0002', dept: '사무행정실', m: 12, d: 15 },
  { id: 19, name: '박지영', empId: '2023-0045', dept: '활동지원팀', m: 12, d: 22 },
  { id: 20, name: '최수연', empId: '2025-0001', dept: '사무행정실', m: 12, d: 27 },
];

let selected = null;

function save() { localStorage.setItem('birthdays', JSON.stringify(data)); render(); }
function getToday() { const d = new Date(); return { m: d.getMonth() + 1, d: d.getDate() }; }
function isToday(b) { const t = getToday(); return b.m === t.m && b.d === t.d; }
function openModal() { document.getElementById('modal').classList.add('active'); }
function closeModal() { document.getElementById('modal').classList.remove('active'); document.querySelector('form').reset(); }

function addEmployee(e) {
  e.preventDefault();
  const newId = Math.max(...data.map(x => x.id), 0) + 1;
  data.push({
    id: newId,
    name: document.getElementById('name').value,
    empId: document.getElementById('id').value || '-',
    dept: document.getElementById('dept').value,
    m: parseInt(document.getElementById('month').value),
    d: parseInt(document.getElementById('day').value),
  });
  save();
  closeModal();
}

function deleteEmployee(id) {
  if (confirm('삭제하시겠습니까?')) {
    data = data.filter(x => x.id !== id);
    save();
  }
}

function showTab(tab) {
  document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  event.target.classList.add('active');
  if (tab === 'calendar') renderCalendar();
}

function renderList() {
  const t = getToday();
  const months = [...new Set(data.map(x => x.m))].sort((a, b) => a - b);
  let html = `<button class="month-btn ${selected === null ? 'active' : ''}" onclick="selectMonth(null)">전체</button>`;
  months.forEach(m => {
    html += `<button class="month-btn ${selected === m ? 'active' : ''}" onclick="selectMonth(${m})">${MONTHS[m-1]}</button>`;
  });
  document.getElementById('monthNav').innerHTML = html;

  let list = selected ? data.filter(x => x.m === selected) : data;
  list = list.sort((a, b) => a.m !== b.m ? a.m - b.m : a.d - b.d);

  if (list.length === 0) {
    document.getElementById('listContent').innerHTML = '<div class="empty">생일자가 없습니다</div>';
    return;
  }

  let html2 = '<div class="birthday-list">';
  list.forEach(b => {
    const color = COLORS[b.dept] || '#666';
    const today = isToday(b);
    html2 += `<div class="birthday-card ${today ? 'today' : ''}">
      <div class="avatar" style="background:${color}">${b.name[0]}</div>
      <div class="card-info">
        <div class="card-name">${b.name} ${today ? '🎂' : ''}</div>
        <div class="card-meta">
          <span>🏢 ${b.dept}</span>
          <span>🪪 ${b.empId}</span>
        </div>
      </div>
      <div class="date-badge">
        <div class="date-day">${b.d}</div>
        <div class="date-month">${MONTHS[b.m-1]}</div>
      </div>
      <button class="btn-delete" onclick="deleteEmployee(${b.id})">삭제</button>
    </div>`;
  });
  html2 += '</div>';
  document.getElementById('listContent').innerHTML = html2;
}

function renderCalendar() {
  const t = getToday();
  const days = ['일','월','화','수','목','금','토'];
  let html = '';
  days.forEach(d => html += `<div class="cal-header">${d}</div>`);

  const daysInMonth = new Date(t.m === 12 ? t.m : t.m, t.m === 12 ? 0 : t.m, 0).getDate();
  const firstDay = new Date(new Date().getFullYear(), t.m - 1, 1).getDay();

  for (let i = 0; i < firstDay; i++) html += '<div class="cal-day"></div>';
  for (let day = 1; day <= daysInMonth; day++) {
    const names = data.filter(x => x.m === t.m && x.d === day).map(x => x.name);
    html += `<div class="cal-day">
      <div class="cal-day-num">${day}</div>
      ${names.length ? `<div class="cal-names">${names.join(',')}</div>` : ''}
    </div>`;
  }

  document.getElementById('calendarContent').innerHTML = html;
}

function selectMonth(m) { selected = m; renderList(); }
function downloadData() {
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'birthdays.json';
  a.click();
}

function render() {
  const t = getToday();
  document.getElementById('total').textContent = data.length;
  document.getElementById('thisMonth').textContent = data.filter(x => x.m === t.m).length;
  renderList();
}

render();
</script>
</body>
</html>
