<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>구로자립생활센터 직원 생일 관리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f2ed;
    --surface: #ffffff;
    --surface2: #faf8f5;
    --border: #e8e2d9;
    --text: #1a1714;
    --text2: #6b6560;
    --accent: #c84b2f;
    --accent2: #e8875a;
    --accent-light: #fdf0eb;
    --dept-1: #3d6b8c;
    --dept-2: #5a8a5c;
    --dept-3: #8c6b3d;
    --dept-4: #7a5c8c;
    --shadow: 0 2px 12px rgba(26,23,20,0.08);
    --shadow-lg: 0 8px 32px rgba(26,23,20,0.12);
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--text);
    color: #fff;
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 16px rgba(0,0,0,0.2);
  }
  .header-left {
    display: flex;
    align-items: baseline;
    gap: 12px;
  }
  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.3rem;
    letter-spacing: -0.3px;
    color: #fff;
  }
  header .subtitle {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.5);
    font-weight: 300;
  }
  .header-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  /* ── Buttons ── */
  .btn {
    padding: 8px 16px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: #b03d24; }
  .btn-ghost {
    background: rgba(255,255,255,0.1);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.2);
  }
  .btn-ghost:hover { background: rgba(255,255,255,0.2); }
  .btn-sm {
    padding: 5px 10px;
    font-size: 0.76rem;
    border-radius: 6px;
  }
  .btn-edit {
    background: var(--surface2);
    color: var(--dept-1);
    border: 1px solid var(--border);
  }
  .btn-edit:hover { background: #dbe8f0; border-color: var(--dept-1); }
  .btn-delete {
    background: var(--surface2);
    color: var(--accent);
    border: 1px solid var(--border);
  }
  .btn-delete:hover { background: var(--accent-light); border-color: var(--accent); }
  .btn-cancel {
    background: var(--surface2);
    color: var(--text2);
    border: 1px solid var(--border);
  }
  .btn-cancel:hover { background: var(--border); }

  /* ── Main layout ── */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  /* ── Today banner ── */
  .today-banner {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    color: #fff;
    border-radius: var(--radius);
    padding: 1.25rem 1.75rem;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    box-shadow: var(--shadow-lg);
  }
  .today-banner .icon { font-size: 2rem; }
  .today-banner .info { flex: 1; }
  .today-banner .info h2 { font-size: 1.05rem; font-weight: 700; margin-bottom: 2px; }
  .today-banner .info p { font-size: 0.82rem; opacity: 0.85; }
  .today-banner.hidden { display: none; }

  /* ── Controls bar ── */
  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    align-items: center;
  }
  .search-wrap {
    flex: 1;
    min-width: 200px;
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    padding: 10px 14px 10px 38px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.88rem;
    background: var(--surface);
    color: var(--text);
    transition: border-color 0.15s;
    outline: none;
  }
  .search-wrap input:focus { border-color: var(--accent2); }
  .search-wrap .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text2);
    font-size: 0.9rem;
  }
  select.filter {
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.85rem;
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    outline: none;
    transition: border-color 0.15s;
  }
  select.filter:focus { border-color: var(--accent2); }

  /* ── Month groups ── */
  .month-group { margin-bottom: 2rem; }
  .month-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 0.75rem;
  }
  .month-label {
    font-family: 'DM Serif Display', serif;
    font-size: 1.5rem;
    color: var(--text);
    line-height: 1;
  }
  .month-count {
    font-size: 0.75rem;
    color: var(--text2);
    background: var(--border);
    border-radius: 20px;
    padding: 2px 10px;
    font-weight: 500;
  }
  .month-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── Card grid ── */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }

  /* ── Birthday card ── */
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 1.1rem 1.2rem;
    border: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    gap: 1rem;
    transition: box-shadow 0.2s, border-color 0.2s, transform 0.15s;
    position: relative;
    overflow: hidden;
  }
  .card:hover {
    box-shadow: var(--shadow);
    border-color: #d5cec5;
    transform: translateY(-1px);
  }
  .card.today-card {
    border-color: var(--accent2);
    background: var(--accent-light);
  }
  .card.soon-card {
    border-color: #f0d4c4;
  }
  .card-date-badge {
    min-width: 52px;
    height: 52px;
    border-radius: 10px;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border: 1.5px solid var(--border);
  }
  .card.today-card .card-date-badge {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .card-date-badge .day {
    font-size: 1.25rem;
    font-weight: 700;
    line-height: 1;
  }
  .card-date-badge .month-sm {
    font-size: 0.65rem;
    color: var(--text2);
    margin-top: 1px;
  }
  .card.today-card .card-date-badge .month-sm { color: rgba(255,255,255,0.8); }

  .card-info { flex: 1; min-width: 0; }
  .card-name {
    font-size: 0.98rem;
    font-weight: 700;
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-meta {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
  }
  .dept-tag {
    font-size: 0.7rem;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .card-empid {
    font-size: 0.7rem;
    color: var(--text2);
  }

  .card-actions {
    display: flex;
    flex-direction: column;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .card:hover .card-actions { opacity: 1; }

  .today-badge {
    position: absolute;
    top: 8px;
    right: 8px;
    font-size: 0.65rem;
    font-weight: 700;
    color: var(--accent);
    background: #fff;
    border: 1px solid var(--accent);
    border-radius: 20px;
    padding: 1px 7px;
  }

  /* ── Dept colors ── */
  .dept-활동지원팀 { background: #dce8f2; color: var(--dept-1); }
  .dept-복지사업팀 { background: #dceedd; color: var(--dept-2); }
  .dept-사무국 { background: #f2e8dc; color: var(--dept-3); }
  .dept-사무행정실 { background: #ecdcf2; color: var(--dept-4); }

  /* ── Empty state ── */
  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text2);
  }
  .empty-state .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
  .empty-state p { font-size: 0.9rem; }

  /* ── Stats bar ── */
  .stats-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  .stat-chip {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .stat-chip .stat-num {
    font-family: 'DM Serif Display', serif;
    font-size: 1.4rem;
    line-height: 1;
    color: var(--accent);
  }
  .stat-chip .stat-label {
    font-size: 0.75rem;
    color: var(--text2);
    line-height: 1.3;
  }

  /* ── Modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,23,20,0.5);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: 16px;
    padding: 2rem;
    width: 100%;
    max-width: 460px;
    box-shadow: var(--shadow-lg);
    animation: slideUp 0.2s ease;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .modal h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.4rem;
    margin-bottom: 1.5rem;
    color: var(--text);
  }
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 1.25rem;
  }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group.full { grid-column: 1 / -1; }
  .form-group label {
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--text2);
  }
  .form-group input,
  .form-group select {
    padding: 9px 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.88rem;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  .form-group input:focus,
  .form-group select:focus { border-color: var(--accent2); background: #fff; }
  .modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text);
    color: #fff;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 500;
    z-index: 300;
    transition: transform 0.3s ease;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    header { padding: 0 1rem; }
    header h1 { font-size: 1.1rem; }
    main { padding: 1rem; }
    .cards-grid { grid-template-columns: 1fr; }
    .form-grid { grid-template-columns: 1fr; }
    .form-group.full { grid-column: 1; }
    .stats-bar { gap: 8px; }
    .stat-chip { padding: 8px 12px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>🎂 Birthday Manager</h1>
    <span class="subtitle">구로자립생활센터</span>
  </div>
  <div class="header-actions">
    <button class="btn btn-ghost" onclick="exportJSON()">⬇ JSON 저장</button>
    <button class="btn btn-primary" onclick="openAddModal()">＋ 직원 추가</button>
  </div>
</header>

<main>
  <!-- Today banner -->
  <div class="today-banner hidden" id="todayBanner">
    <div class="icon">🎉</div>
    <div class="info">
      <h2 id="todayBannerTitle"></h2>
      <p id="todayBannerSub"></p>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-bar" id="statsBar"></div>

  <!-- Controls -->
  <div class="controls">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="이름, 부서 검색…" oninput="render()">
    </div>
    <select class="filter" id="deptFilter" onchange="render()">
      <option value="">전체 부서</option>
    </select>
    <select class="filter" id="monthFilter" onchange="render()">
      <option value="">전체 월</option>
    </select>
  </div>

  <!-- Cards by month -->
  <div id="listContainer"></div>
</main>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <h2 id="modalTitle">직원 추가</h2>
    <div class="form-grid">
      <div class="form-group full">
        <label>이름 *</label>
        <input type="text" id="f_name" placeholder="홍길동">
      </div>
      <div class="form-group full">
        <label>사원번호</label>
        <input type="text" id="f_empId" placeholder="2026-0001">
      </div>
      <div class="form-group full">
        <label>부서 *</label>
        <select id="f_dept">
          <option value="사무국">사무국</option>
          <option value="사무행정실">사무행정실</option>
          <option value="활동지원팀">활동지원팀</option>
          <option value="복지사업팀">복지사업팀</option>
        </select>
      </div>
      <div class="form-group">
        <label>생일 월 *</label>
        <select id="f_m">
          <option value="1">1월</option><option value="2">2월</option>
          <option value="3">3월</option><option value="4">4월</option>
          <option value="5">5월</option><option value="6">6월</option>
          <option value="7">7월</option><option value="8">8월</option>
          <option value="9">9월</option><option value="10">10월</option>
          <option value="11">11월</option><option value="12">12월</option>
        </select>
      </div>
      <div class="form-group">
        <label>생일 일 *</label>
        <input type="number" id="f_d" min="1" max="31" placeholder="15">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="saveEmployee()">저장</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── Data ──────────────────────────────────────────────
let data = [
  {"id":1,"name":"이혜민","empId":"2017-0023","dept":"활동지원팀","m":1,"d":16},
  {"id":2,"name":"이은희","empId":"2017-0002","dept":"사무국","m":1,"d":22},
  {"id":3,"name":"신건철","empId":"2026-0009","dept":"사무국","m":1,"d":28},
  {"id":4,"name":"정채윤","empId":"2025-0095","dept":"활동지원팀","m":2,"d":1},
  {"id":5,"name":"김은서","empId":"2025-0078","dept":"복지사업팀","m":2,"d":15},
  {"id":6,"name":"노현숙","empId":"2024-0139","dept":"사무행정실","m":2,"d":17},
  {"id":7,"name":"김주진","empId":"2022-0204","dept":"활동지원팀","m":2,"d":24},
  {"id":8,"name":"박수빈","empId":"2026-0008","dept":"복지사업팀","m":4,"d":19},
  {"id":9,"name":"송지은","empId":"2025-0121","dept":"복지사업팀","m":7,"d":2},
  {"id":10,"name":"주덕원","empId":"2025-0138","dept":"복지사업팀","m":9,"d":18},
  {"id":11,"name":"권은지","empId":"2025-0137","dept":"활동지원팀","m":9,"d":22},
  {"id":12,"name":"김유리","empId":"2026-0012","dept":"활동지원팀","m":10,"d":20},
  {"id":13,"name":"이세은","empId":"2024-0001","dept":"복지사업팀","m":11,"d":7},
  {"id":14,"name":"박진미","empId":"2017-0118","dept":"활동지원팀","m":11,"d":9},
  {"id":15,"name":"김휘원","empId":"2025-0043","dept":"사무행정실","m":11,"d":9},
  {"id":16,"name":"인상필","empId":"2025-0126","dept":"복지사업팀","m":11,"d":10},
  {"id":17,"name":"최유나","empId":"2024-0086","dept":"복지사업팀","m":11,"d":14},
  {"id":18,"name":"조승민","empId":"2025-0002","dept":"사무행정실","m":12,"d":15},
  {"id":19,"name":"박지영","empId":"2023-0045","dept":"활동지원팀","m":12,"d":22},
  {"id":20,"name":"최수연","empId":"2025-0001","dept":"사무행정실","m":12,"d":27}
  {"id":21,"name":"강지나","empId":"2026-0040","dept":"복지사업팀","m":9,"d":9}
  {"id":22,"name":"이동수","empId":"2026-0040","dept":"대표","m":2,"d":25}
];

let editingId = null;
const today = new Date();
const todayM = today.getMonth() + 1;
const todayD = today.getDate();

const MONTH_KO = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

function nextId() {
  return data.length === 0 ? 1 : Math.max(...data.map(d => d.id)) + 1;
}

function isToday(m, d) { return m === todayM && d === todayD; }

function isSoon(m, d, days = 7) {
  const bday = new Date(today.getFullYear(), m - 1, d);
  const diff = (bday - today) / (1000 * 60 * 60 * 24);
  return diff > 0 && diff <= days;
}

// ── Stats bar ─────────────────────────────────────────
function renderStats() {
  const todayBirthdays = data.filter(e => isToday(e.m, e.d));
  const soonBirthdays  = data.filter(e => isSoon(e.m, e.d));
  const depts = [...new Set(data.map(e => e.dept))];

  // Today banner
  const banner = document.getElementById('todayBanner');
  if (todayBirthdays.length > 0) {
    banner.classList.remove('hidden');
    document.getElementById('todayBannerTitle').textContent =
      `🎂 오늘의 생일: ${todayBirthdays.map(e => e.name).join(', ')}`;
    document.getElementById('todayBannerSub').textContent =
      `${todayM}월 ${todayD}일 · ${todayBirthdays.map(e => e.dept).join(', ')}`;
  } else {
    banner.classList.add('hidden');
  }

  // Stats
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-chip">
      <span class="stat-num">${data.length}</span>
      <span class="stat-label">전체<br>직원</span>
    </div>
    <div class="stat-chip">
      <span class="stat-num">${todayBirthdays.length}</span>
      <span class="stat-label">오늘<br>생일</span>
    </div>
    <div class="stat-chip">
      <span class="stat-num">${soonBirthdays.length}</span>
      <span class="stat-label">7일 내<br>생일</span>
    </div>
    <div class="stat-chip">
      <span class="stat-num">${depts.length}</span>
      <span class="stat-label">부서<br>수</span>
    </div>
  `;
}

// ── Filters ───────────────────────────────────────────
function initFilters() {
  const depts = [...new Set(data.map(e => e.dept))].sort();
  const deptSel = document.getElementById('deptFilter');
  deptSel.innerHTML = '<option value="">전체 부서</option>' +
    depts.map(d => `<option value="${d}">${d}</option>`).join('');

  const monthSel = document.getElementById('monthFilter');
  monthSel.innerHTML = '<option value="">전체 월</option>' +
    MONTH_KO.map((m, i) => `<option value="${i+1}">${m}</option>`).join('');
}

// ── Render ────────────────────────────────────────────
function render() {
  const q    = document.getElementById('searchInput').value.trim().toLowerCase();
  const dept = document.getElementById('deptFilter').value;
  const mon  = parseInt(document.getElementById('monthFilter').value) || 0;

  let filtered = data.filter(e => {
    const matchQ    = !q || e.name.includes(q) || e.dept.includes(q) || e.empId.includes(q);
    const matchDept = !dept || e.dept === dept;
    const matchMon  = !mon || e.m === mon;
    return matchQ && matchDept && matchMon;
  });

  // Sort by month then day
  filtered.sort((a, b) => a.m !== b.m ? a.m - b.m : a.d - b.d);

  const container = document.getElementById('listContainer');

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🔍</div>
        <p>검색 결과가 없습니다.</p>
      </div>`;
    return;
  }

  // Group by month
  const byMonth = {};
  filtered.forEach(e => {
    if (!byMonth[e.m]) byMonth[e.m] = [];
    byMonth[e.m].push(e);
  });

  container.innerHTML = Object.entries(byMonth).map(([m, employees]) => `
    <div class="month-group">
      <div class="month-header">
        <span class="month-label">${MONTH_KO[m-1]}</span>
        <span class="month-count">${employees.length}명</span>
        <div class="month-line"></div>
      </div>
      <div class="cards-grid">
        ${employees.map(e => renderCard(e)).join('')}
      </div>
    </div>
  `).join('');
}

function renderCard(e) {
  const today_  = isToday(e.m, e.d);
  const soon_   = isSoon(e.m, e.d);
  const classes = ['card', today_ ? 'today-card' : '', soon_ && !today_ ? 'soon-card' : ''].filter(Boolean).join(' ');
  return `
    <div class="${classes}">
      <div class="card-date-badge">
        <span class="day">${e.d}</span>
        <span class="month-sm">${MONTH_KO[e.m-1]}</span>
      </div>
      <div class="card-info">
        <div class="card-name">${e.name}</div>
        <div class="card-meta">
          <span class="dept-tag dept-${e.dept}">${e.dept}</span>
          <span class="card-empid">${e.empId}</span>
        </div>
      </div>
      <div class="card-actions">
        <button class="btn btn-sm btn-edit" onclick="openEditModal(${e.id})">수정</button>
        <button class="btn btn-sm btn-delete" onclick="deleteEmployee(${e.id})">삭제</button>
      </div>
      ${today_ ? '<span class="today-badge">🎂 오늘!</span>' : ''}
    </div>
  `;
}

// ── Modal ─────────────────────────────────────────────
function openAddModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = '직원 추가';
  document.getElementById('f_name').value = '';
  document.getElementById('f_empId').value = '';
  document.getElementById('f_dept').value = '사무국';
  document.getElementById('f_m').value = '1';
  document.getElementById('f_d').value = '';
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('f_name').focus(), 50);
}

function openEditModal(id) {
  const e = data.find(x => x.id === id);
  if (!e) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = '직원 정보 수정';
  document.getElementById('f_name').value  = e.name;
  document.getElementById('f_empId').value = e.empId;
  document.getElementById('f_dept').value  = e.dept;
  document.getElementById('f_m').value     = e.m;
  document.getElementById('f_d').value     = e.d;
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('f_name').focus(), 50);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function saveEmployee() {
  const name  = document.getElementById('f_name').value.trim();
  const empId = document.getElementById('f_empId').value.trim();
  const dept  = document.getElementById('f_dept').value;
  const m     = parseInt(document.getElementById('f_m').value);
  const d     = parseInt(document.getElementById('f_d').value);

  if (!name) { showToast('⚠️ 이름을 입력해주세요'); return; }
  if (!d || d < 1 || d > 31) { showToast('⚠️ 날짜를 올바르게 입력해주세요'); return; }

  if (editingId !== null) {
    const idx = data.findIndex(x => x.id === editingId);
    data[idx] = { id: editingId, name, empId, dept, m, d };
    showToast('✅ 수정되었습니다');
  } else {
    data.push({ id: nextId(), name, empId, dept, m, d });
    showToast('✅ 추가되었습니다');
  }

  closeModal();
  initFilters();
  renderStats();
  render();
}

function deleteEmployee(id) {
  const e = data.find(x => x.id === id);
  if (!e) return;
  if (!confirm(`"${e.name}" 직원을 삭제하시겠습니까?`)) return;
  data = data.filter(x => x.id !== id);
  initFilters();
  renderStats();
  render();
  showToast('🗑 삭제되었습니다');
}

// ── Export ────────────────────────────────────────────
function exportJSON() {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'birthdays.json';
  a.click();
  showToast('⬇ birthdays.json 다운로드 완료');
}

// ── Toast ─────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Keyboard shortcut ─────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// ── Init ──────────────────────────────────────────────
initFilters();
renderStats();
render();
</script>
</body>
</html>
